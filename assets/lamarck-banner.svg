<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Lamarck</title>
  <desc id="desc">A poster-style banner for Lamarck: your personal system evolves from use.</desc>
  <defs>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#fffdf6" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>
    <linearGradient id="heat" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#111111"/>
      <stop offset="0.48" stop-color="#111111"/>
      <stop offset="1" stop-color="#ff4b24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="10" dy="10" stdDeviation="0" flood-color="#ff4b24" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="#111111"/>
  <rect width="1200" height="360" fill="url(#grid)"/>
  <path d="M0 0H1200V360H914C1012 274 1076 169 1110 0H0Z" fill="url(#heat)" opacity="0.48"/>
  <rect x="34" y="34" width="1132" height="292" fill="none" stroke="#fffdf6" stroke-opacity="0.2"/>
  <rect x="34" y="316" width="1132" height="10" fill="#ff4b24"/>

  <g transform="translate(72 74)">
    <rect x="0" y="0" width="58" height="58" fill="#ff4b24"/>
    <text x="29" y="37" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19" font-weight="800" fill="#111111">L0</text>

    <text x="0" y="134" font-family="Georgia, Iowan Old Style, serif" font-size="94" font-weight="700" letter-spacing="-1" fill="#fffdf6">Lamarck</text>
    <text x="4" y="177" font-family="Avenir Next, Segoe UI, sans-serif" font-size="25" fill="#fffdf6" opacity="0.86">Your personal system evolves from use.</text>
    <text x="4" y="211" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#ff4b24" font-weight="800">use -&gt; events -&gt; history -&gt; data -&gt; apps -&gt; better use</text>
  </g>

  <g transform="translate(638 68)" filter="url(#shadow)">
    <rect x="0" y="0" width="212" height="62" fill="#fffdf6" fill-opacity="0.08" stroke="#fffdf6" stroke-opacity="0.22"/>
    <text x="18" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#ff4b24" font-weight="800">REVIEW APP</text>
    <text x="18" y="47" font-family="Avenir Next, Segoe UI, sans-serif" font-size="13" fill="#fffdf6" opacity="0.76">commits + notes + calls</text>

    <rect x="244" y="42" width="212" height="62" fill="#fffdf6" fill-opacity="0.08" stroke="#fffdf6" stroke-opacity="0.22"/>
    <text x="262" y="70" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#ff4b24" font-weight="800">FINANCE RADAR</text>
    <text x="262" y="89" font-family="Avenir Next, Segoe UI, sans-serif" font-size="13" fill="#fffdf6" opacity="0.76">spending + plans</text>

    <rect x="88" y="126" width="212" height="62" fill="#fffdf6" fill-opacity="0.08" stroke="#fffdf6" stroke-opacity="0.22"/>
    <text x="106" y="154" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#ff4b24" font-weight="800">ENERGY LOOP</text>
    <text x="106" y="173" font-family="Avenir Next, Segoe UI, sans-serif" font-size="13" fill="#fffdf6" opacity="0.76">sleep + work + travel</text>
  </g>

  <g transform="translate(610 286)">
    <line x1="0" y1="0" x2="504" y2="0" stroke="#ff4b24" stroke-width="3"/>
    <g fill="#ff4b24" stroke="#111111" stroke-width="3">
      <rect x="22" y="-8" width="16" height="16"/>
      <rect x="164" y="-8" width="16" height="16"/>
      <rect x="306" y="-8" width="16" height="16"/>
      <rect x="448" y="-8" width="16" height="16"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#fffdf6" opacity="0.72">
      <text x="0" y="30">08:42 PR reviewed</text>
      <text x="132" y="30">10:03 deep work</text>
      <text x="276" y="30">12:28 bank row</text>
      <text x="420" y="30">18:10 note</text>
    </g>
  </g>
