id: oura
name: Oura
entry: ./index.mjs
runtime:
  mode: poll
  defaultSchedule: "0 */6 * * *"
integrations:
  mode: multiple
platforms:
  darwin: {}
  linux: {}
  windows: {}
  ios: {}
  android: {}
  cloud: {}
auth:
  type: oauth2-byo-confidential
  authorizationEndpoint: https://cloud.ouraring.com/oauth/authorize
  tokenEndpoint: https://api.ouraring.com/oauth/token
  tokenEndpointAuthMethod: client_secret_post
  scope:
    - daily
    - heartrate
    - tag
    - workout
    - session
    - spo2
    - ring_configuration
    - stress
    - heart_health
config:
  lookback-days:
    type: number
    label: Lookback days
    default: 3
  backfill-years:
    type: number
    label: Backfill years
    default: 3
  include-heartrate:
    type: boolean
    label: Include heart rate
    default: true
