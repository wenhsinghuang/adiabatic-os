name = "lamarck-app"
main = "src/worker.ts"
compatibility_date = "2026-06-25"
workers_dev = true
preview_urls = true

[[routes]]
pattern = "app.lamarck.ai"
custom_domain = true

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"
