<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lamarck App</title>
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#f4f1e9" />
    <style>
      :root {
        --ink: #151312;
        --paper: #f4f1e9;
        --paper-hot: #fffaf0;
        --muted: #706a60;
        --line: rgba(21, 19, 18, 0.16);
        --rust: #ff4b24;
        --teal: #2d6f7f;
        --amber: #f0b64a;
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--paper);
      }

      body {
        min-height: 100%;
        margin: 0;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(21, 19, 18, 0.055) 1px, transparent 1px) 0 0 / 34px 34px,
          linear-gradient(0deg, rgba(21, 19, 18, 0.04) 1px, transparent 1px) 0 0 / 34px 34px,
          var(--paper);
        font-family: "Avenir Next", Optima, Candara, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      .button {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        color: var(--paper-hot);
        background: var(--ink);
        border: 2px solid var(--ink);
        border-radius: var(--radius);
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button[disabled] {
        color: rgba(21, 19, 18, 0.46);
        background: rgba(21, 19, 18, 0.08);
        border-color: rgba(21, 19, 18, 0.12);
        cursor: not-allowed;
      }

      .page {
        display: grid;
        min-height: 100svh;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 24px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 900;
      }

      .mark {
        display: grid;
        width: 32px;
        height: 32px;
        place-items: center;
        color: var(--ink);
        background: var(--rust);
        border-radius: 4px;
        font-family: "Berkeley Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 12px;
      }

      .nav {
        display: flex;
        gap: 16px;
        color: var(--muted);
        font-size: 14px;
      }

      .nav a:hover {
        color: var(--ink);
      }

      .main {
        display: grid;
        align-items: start;
        justify-items: center;
        padding: 32px 20px 64px;
      }

      .auth {
        display: grid;
        gap: 16px;
        width: min(560px, 100%);
      }

      .auth-title {
        margin: 0;
        font-family: "Iowan Old Style", Charter, Georgia, serif;
        font-size: clamp(28px, 4vw, 36px);
        font-weight: 700;
        line-height: 1.04;
      }

      .auth-note {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      #clerk-mount {
        min-height: 360px;
      }

      .fallback {
        display: grid;
        gap: 14px;
        padding: 18px;
        background: rgba(240, 182, 74, 0.18);
        border: 1px solid rgba(126, 86, 18, 0.22);
        border-radius: var(--radius);
        line-height: 1.45;
      }

      .signed-in {
        display: grid;
        gap: 14px;
      }

      .panel {
        display: grid;
        gap: 14px;
        padding: 18px;
        background: rgba(255, 250, 240, 0.64);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: 0 18px 50px rgba(21, 19, 18, 0.08);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .stack {
        display: grid;
        min-width: 0;
        gap: 3px;
      }

      .eyebrow {
        color: var(--muted);
        font-family: "Berkeley Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .status-pill {
        display: inline-flex;
        min-height: 26px;
        align-items: center;
        gap: 7px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        background: rgba(244, 241, 233, 0.76);
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }

      .status-pill::before {
        width: 7px;
        height: 7px;
        content: "";
        background: var(--amber);
        border-radius: 50%;
      }

      .status-pill.connected {
        color: #205b36;
        border-color: rgba(32, 91, 54, 0.26);
        background: rgba(82, 151, 94, 0.12);
      }

      .status-pill.connected::before {
        background: #2f9e44;
      }

      .status-pill.error {
        color: #8f2a1a;
        border-color: rgba(143, 42, 26, 0.25);
        background: rgba(255, 75, 36, 0.1);
      }

      .status-pill.error::before {
        background: var(--rust);
      }

      .provider {
        display: grid;
        gap: 14px;
      }

      .provider b {
        text-transform: capitalize;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .small {
        color: var(--muted);
        font-family: "Berkeley Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      @media (max-width: 560px) {
        .topbar {
          padding: 14px 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Lamarck app home">
          <span class="mark">L0</span>
          <span>Lamarck</span>
        </a>
        <nav class="nav" aria-label="App navigation">
          <a href="https://lamarck.ai">Landing</a>
          <a href="/auth/sign-in">Sign in</a>
        </nav>
      </header>

      <main class="main">
        <section class="auth" aria-labelledby="auth-title">
          <h1 class="auth-title" id="auth-title">Sign in</h1>
          <p class="auth-note" id="auth-note">Use your Lamarck account to continue.</p>
          <div id="clerk-mount"></div>
        </section>
      </main>
    </div>

    <script src="/config.js"></script>
    <script type="module">
      const appConfig = window.__LAMARCK_CONFIG__ || {};
      const apiBaseUrl = appConfig.apiBaseUrl || "https://api.lamarck.ai";
      const providers = {
        oura: {
          name: "Oura",
          capability: "Health signals",
          endpoint: `${apiBaseUrl}/providers/oura`,
        },
      };

      const route = new URL(window.location.href);
      const path = route.pathname.replace(/\/+$/, "") || "/";
      const providerMatch = path.match(/^\/providers\/([^/]+)\/connect$/);
      const providerId = providerMatch ? decodeURIComponent(providerMatch[1]) : null;
      const providerIntegrationId = route.searchParams.get("integrationId");
      const providerIntegrationKey = route.searchParams.get("integrationKey");
      const providerAutoStart = route.searchParams.get("start") === "1";
      const providerConnected = route.searchParams.get("connected") === "1";
      const providerError = route.searchParams.get("error");
      const providerMessage = route.searchParams.get("message");
      const desktopAuthorize = path === "/auth/authorize";
      const requestedRedirect = safeReturnPath(route.searchParams.get("redirect_url"));
      const provider = providerId
        ? providers[providerId] || {
            name: providerId.replace(/[-_]/g, " "),
            capability: "Managed provider",
            endpoint: `${apiBaseUrl}/providers/${providerId}`,
          }
        : null;
      const continueTo = providerId
        ? `/providers/${encodeURIComponent(providerId)}/connect${route.search}`
        : desktopAuthorize
          ? `/auth/authorize${route.search}`
          : requestedRedirect || "/";

      const mount = document.getElementById("clerk-mount");
      const authTitle = document.getElementById("auth-title");
      const authNote = document.getElementById("auth-note");
      let providerConnection = null;
      let providerAutoStartUsed = false;

      if (provider) {
        authTitle.textContent = `Connect ${provider.name}`;
        authNote.textContent = `Sign in to continue to ${provider.name}.`;
      } else if (desktopAuthorize) {
        authTitle.textContent = "Sign in to Lamarck";
        authNote.textContent = "Continue to the desktop app after signing in.";
      } else if (path === "/") {
        authTitle.textContent = "Your Lamarck account";
        authNote.textContent = "Manage identity, devices, and provider connections.";
      }

      function showMissingConfig() {
        mount.innerHTML = `
          <div class="fallback">
            <strong>Clerk is not configured for this Worker yet.</strong>
            <span>Set <code>clerkPublishableKey</code> in <code>config.js</code>, then redeploy.</span>
          </div>
        `;
      }

      function renderSignedIn(clerk) {
        const user = clerk.user;
        const email = escapeHtml(user?.primaryEmailAddress?.emailAddress || "Signed in");
        mount.innerHTML = `
          <div class="signed-in">
            <div class="panel">
              <div class="row">
                <div class="stack">
                  <span class="eyebrow">Account</span>
                  <strong>${email}</strong>
                  <span class="small" id="backend-session">Syncing backend user...</span>
                </div>
                <span class="status-pill connected">Signed in</span>
              </div>
            </div>
            ${
              provider
                ? `<div class="panel provider">
                    <div class="row">
                      <div class="stack">
                        <span class="eyebrow">Managed provider</span>
                        <strong>${escapeHtml(provider.name)}</strong>
                        <span>${escapeHtml(provider.capability)}</span>
                      </div>
                      <span class="status-pill" id="provider-status-pill">${providerStatusLabel()}</span>
                    </div>
                    <span class="small">${escapeHtml(provider.endpoint)}</span>
                    <div class="button-row">
                      <button id="start-provider-connect" type="button">${providerActionLabel()}</button>
                    </div>
                    <span class="small" id="provider-connect-status">${providerConnectStatusText()}</span>
                  </div>`
                : `<div class="panel">
                    <div class="stack">
                      <span class="eyebrow">Providers</span>
                      <strong>Managed from Lamarck Desktop</strong>
                      <span class="small">Provider connections are bound to a desktop integration.</span>
                    </div>
                  </div>`
            }
            <button id="sign-out" type="button">Sign out</button>
          </div>
        `;
        document.getElementById("sign-out")?.addEventListener("click", () => {
          clerk.signOut({ redirectUrl: "/auth/sign-in" });
        });
        document.getElementById("start-provider-connect")?.addEventListener("click", () => {
          startProviderConnect(clerk);
        });
        void syncBackendSession(clerk);
        if (provider) {
          void loadProviderConnection(clerk).then(() => {
            maybeAutoStartProviderConnect(clerk);
          });
        }
      }

      function providerConnectStatusText() {
        if (!providerIntegrationId) return "Open this page from Lamarck Desktop to bind a provider connection.";
        if (providerConnection?.status === "connected") {
          const label = providerConnection.providerEmail || providerConnection.providerSubject || "Provider account connected";
          return `${label}. You can return to Lamarck Desktop.`;
        }
        if (providerConnection?.lastError) return providerConnection.lastError;
        if (providerConnection?.status === "needs_reconnect") return "Provider needs reconnect.";
        if (providerConnection?.status === "revoked") return "Provider connection was revoked.";
        if (providerConnection?.status === "not_connected") return "Provider is not connected for this desktop integration.";
        if (providerConnected) return "Provider connected. You can return to Lamarck Desktop.";
        if (providerError) return providerMessage || providerError;
        return "Checking provider connection...";
      }

      function providerStatusLabel() {
        if (providerConnection?.status === "connected" || providerConnected) return "Connected";
        if (providerConnection?.status === "needs_reconnect") return "Reconnect";
        if (providerConnection?.status === "revoked" || providerError) return "Attention";
        return "Not connected";
      }

      function providerActionLabel() {
        if (providerConnection?.status === "connected" || providerConnected) return `Reconnect ${provider?.name || "provider"}`;
        return `Connect ${provider?.name || "provider"}`;
      }

      function updateProviderPanel() {
        const status = document.getElementById("provider-connect-status");
        const pill = document.getElementById("provider-status-pill");
        const button = document.getElementById("start-provider-connect");
        if (status) status.textContent = providerConnectStatusText();
        if (pill) {
          pill.textContent = providerStatusLabel();
          pill.className = "status-pill";
          if (providerConnection?.status === "connected" || providerConnected) {
            pill.classList.add("connected");
          } else if (providerConnection?.status === "needs_reconnect" || providerConnection?.status === "revoked" || providerError) {
            pill.classList.add("error");
          }
        }
        if (button) {
          button.textContent = providerActionLabel();
          if (providerIntegrationId) {
            button.removeAttribute("disabled");
          } else {
            button.setAttribute("disabled", "");
          }
        }
      }

      function maybeAutoStartProviderConnect(clerk) {
        if (!providerAutoStart || providerAutoStartUsed || !provider || !providerIntegrationId) return;
        if (providerConnected || providerError || providerConnection?.status === "connected") return;
        providerAutoStartUsed = true;
        void startProviderConnect(clerk);
      }

      function renderDesktopAuthorize(clerk) {
        const user = clerk.user;
        const email = user?.primaryEmailAddress?.emailAddress || "your Lamarck account";
        authTitle.textContent = "Continuing to Lamarck Desktop";
        authNote.textContent = `Signed in as ${email}.`;
        mount.innerHTML = `
          <div class="signed-in">
            <div class="session-state">
              <strong>Authorize this desktop session</strong>
              <div class="small" id="desktop-authorize-status">Lamarck Desktop will be able to access your Lamarck account.</div>
            </div>
            <button id="authorize-desktop" type="button">Authorize</button>
            <button id="sign-out" type="button">Use another account</button>
          </div>
        `;
        document.getElementById("authorize-desktop")?.addEventListener("click", () => {
          authorizeDesktop(clerk);
        });
        document.getElementById("sign-out")?.addEventListener("click", () => {
          clerk.signOut({ redirectUrl: continueTo });
        });
      }

      async function syncBackendSession(clerk) {
        const status = document.getElementById("backend-session");
        if (!status) return;

        try {
          const token = await clerk.session?.getToken();
          if (!token) {
            throw new Error("Missing Clerk session token");
          }

          const response = await fetch(`${apiBaseUrl}/me`, {
            method: "GET",
            headers: {
              Authorization: `Bearer ${token}`,
            },
            cache: "no-store",
          });

          const body = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(body?.message || body?.error || `HTTP ${response.status}`);
          }

          status.textContent = `Backend user synced: ${body.userId}`;
          return body;
        } catch (error) {
          status.textContent = `Backend sync failed: ${String(error?.message || error)}`;
          return null;
        }
      }

      async function loadProviderConnection(clerk) {
        if (!providerId || !providerIntegrationId) {
          updateProviderPanel();
          return;
        }
        try {
          const token = await clerk.session?.getToken();
          if (!token) {
            throw new Error("Missing Clerk session token");
          }
          const url = new URL(`${apiBaseUrl}/providers/${encodeURIComponent(providerId)}/connection`);
          url.searchParams.set("integrationId", providerIntegrationId);
          const response = await fetch(url.toString(), {
            method: "GET",
            headers: {
              Authorization: `Bearer ${token}`,
            },
            cache: "no-store",
          });
          const body = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(body.message || body.error || `HTTP ${response.status}`);
          }
          providerConnection = body;
        } catch (error) {
          providerConnection = {
            status: "needs_reconnect",
            lastError: String(error?.message || error),
          };
          const status = document.getElementById("provider-connect-status");
          if (status) status.textContent = `Provider status failed: ${providerConnection.lastError}`;
        } finally {
          updateProviderPanel();
        }
      }

      async function startProviderConnect(clerk) {
        if (!providerId) return;
        const status = document.getElementById("provider-connect-status");
        const button = document.getElementById("start-provider-connect");
        if (!providerIntegrationId) {
          if (status) status.textContent = "Open this page from Lamarck Desktop to bind a provider connection.";
          return;
        }
        if (status) status.textContent = "Starting provider connect...";
        if (button) button.setAttribute("disabled", "");

        try {
          const token = await clerk.session?.getToken();
          if (!token) {
            throw new Error("Missing Clerk session token");
          }

          const response = await fetch(
            `${apiBaseUrl}/providers/${encodeURIComponent(providerId)}/connect/start`,
            {
              method: "POST",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                returnTo: window.location.href,
                integrationId: providerIntegrationId,
                integrationKey: providerIntegrationKey,
              }),
              cache: "no-store",
            },
          );
          const body = await response.json().catch(() => ({}));

          if (!response.ok) {
            const details = body.details || {};
            const providerName = details.displayName || provider.name;
            throw new Error(`${providerName}: ${body.message || body.error || `HTTP ${response.status}`}`);
          }

          if (body.connectUrl) {
            window.location.assign(body.connectUrl);
            return;
          }

          if (status) status.textContent = body.message || "Provider connect started.";
        } catch (error) {
          if (status) status.textContent = String(error?.message || error);
          if (button) button.removeAttribute("disabled");
        }
      }

      async function authorizeDesktop(clerk) {
        const status = document.getElementById("desktop-authorize-status");
        const button = document.getElementById("authorize-desktop");
        if (status) status.textContent = "Authorizing desktop...";
        if (button) button.setAttribute("disabled", "");

        try {
          const token = await clerk.session?.getToken();
          if (!token) {
            throw new Error("Missing Clerk session token");
          }

          const redirectUri = route.searchParams.get("redirect_uri");
          const state = route.searchParams.get("state");
          const codeChallenge = route.searchParams.get("code_challenge");
          const codeChallengeMethod = route.searchParams.get("code_challenge_method");
          const response = await fetch(`${apiBaseUrl}/desktop/auth/authorize`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              redirectUri,
              state,
              codeChallenge,
              codeChallengeMethod,
              deviceName: "Lamarck desktop",
            }),
            cache: "no-store",
          });
          const body = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(body.message || body.error || `HTTP ${response.status}`);
          }
          if (!body.redirectUrl) {
            throw new Error("Desktop authorization response did not include a redirect URL");
          }

          window.location.assign(body.redirectUrl);
        } catch (error) {
          if (status) status.textContent = String(error?.message || error);
          if (button) button.removeAttribute("disabled");
        }
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => {
          switch (char) {
            case "&":
              return "&amp;";
            case "<":
              return "&lt;";
            case ">":
              return "&gt;";
            case '"':
              return "&quot;";
            case "'":
              return "&#39;";
            default:
              return char;
          }
        });
      }

      function safeReturnPath(value) {
        if (!value) return null;
        let url;
        try {
          url = new URL(value, window.location.origin);
        } catch {
          return null;
        }
        if (url.origin !== window.location.origin || !url.pathname.startsWith("/") || url.pathname.startsWith("//")) {
          return null;
        }
        return `${url.pathname}${url.search}${url.hash}`;
      }

      // Clerk's prebuilt UI components (mountSignIn) live only in the browser
      // build served from the instance's Frontend API (FAPI). The generic ESM
      // build on public CDNs omits them, which throws "Clerk was not loaded
      // with UI components". The FAPI host is base64-encoded in the key.
      function loadClerk(publishableKey) {
        if (window.Clerk) return Promise.resolve(window.Clerk);
        const fapi = atob(publishableKey.split("_")[2]).replace(/\$+$/, "");
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.async = true;
          script.crossOrigin = "anonymous";
          script.setAttribute("data-clerk-publishable-key", publishableKey);
          script.src = `https://${fapi}/npm/@clerk/clerk-js@5/dist/clerk.browser.js`;
          script.addEventListener("load", () => resolve(window.Clerk));
          script.addEventListener("error", () =>
            reject(new Error(`Failed to load Clerk from ${fapi}`)),
          );
          document.head.appendChild(script);
        });
      }

      async function mountClerk() {
        const publishableKey = window.__LAMARCK_CONFIG__?.clerkPublishableKey;
        if (!publishableKey) {
          showMissingConfig();
          return;
        }

        mount.innerHTML = `<div class="small">Loading identity...</div>`;
        try {
          const clerk = await loadClerk(publishableKey);
          await clerk.load({
            signInUrl: "/auth/sign-in",
            signUpUrl: "/auth/sign-in",
            signInFallbackRedirectUrl: continueTo,
            signUpFallbackRedirectUrl: continueTo,
            telemetry: { disabled: true },
          });

          if (clerk.user) {
            if (desktopAuthorize) {
              renderDesktopAuthorize(clerk);
              return;
            }
            renderSignedIn(clerk);
            return;
          }

          if (desktopAuthorize || provider) {
            window.location.replace(`/auth/sign-in?redirect_url=${encodeURIComponent(continueTo)}`);
            return;
          }

          mount.innerHTML = "";
          clerk.mountSignIn(mount, {
            routing: "path",
            path: "/auth/sign-in",
            signUpUrl: "/auth/sign-in",
            fallbackRedirectUrl: continueTo,
          });
        } catch (error) {
          mount.innerHTML = `
            <div class="fallback">
              <strong>Unable to load Clerk.</strong>
              <span>${String(error?.message || error)}</span>
            </div>
          `;
        }
      }

      mountClerk();
    </script>
  </body>
</html>
