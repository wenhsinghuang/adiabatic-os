<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lamarck App</title>
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#f4f1e9" />
    <style>
      :root {
        --ink: #151312;
        --paper: #f4f1e9;
        --paper-hot: #fffaf0;
        --muted: #706a60;
        --line: rgba(21, 19, 18, 0.16);
        --rust: #ff4b24;
        --teal: #2d6f7f;
        --amber: #f0b64a;
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--paper);
      }

      body {
        min-height: 100%;
        margin: 0;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(21, 19, 18, 0.055) 1px, transparent 1px) 0 0 / 34px 34px,
          linear-gradient(0deg, rgba(21, 19, 18, 0.04) 1px, transparent 1px) 0 0 / 34px 34px,
          var(--paper);
        font-family: "Avenir Next", Optima, Candara, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      .button {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        color: var(--paper-hot);
        background: var(--ink);
        border: 2px solid var(--ink);
        border-radius: var(--radius);
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button[disabled] {
        color: rgba(21, 19, 18, 0.46);
        background: rgba(21, 19, 18, 0.08);
        border-color: rgba(21, 19, 18, 0.12);
        cursor: not-allowed;
      }

      .page {
        display: grid;
        min-height: 100svh;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 24px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 900;
      }

      .mark {
        display: grid;
        width: 32px;
        height: 32px;
        place-items: center;
        color: var(--ink);
        background: var(--rust);
        border-radius: 4px;
        font-family: "Berkeley Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 12px;
      }

      .nav {
        display: flex;
        gap: 16px;
        color: var(--muted);
        font-size: 14px;
      }

      .nav a:hover {
        color: var(--ink);
      }

      .main {
        display: grid;
        place-items: center;
        padding: 32px 20px 64px;
      }

      .auth {
        display: grid;
        gap: 16px;
        width: min(420px, 100%);
      }

      .auth-title {
        margin: 0;
        font-family: "Iowan Old Style", Charter, Georgia, serif;
        font-size: clamp(28px, 4vw, 36px);
        font-weight: 700;
        line-height: 1.04;
      }

      .auth-note {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      #clerk-mount {
        min-height: 360px;
      }

      .fallback {
        display: grid;
        gap: 14px;
        padding: 18px;
        background: rgba(240, 182, 74, 0.18);
        border: 1px solid rgba(126, 86, 18, 0.22);
        border-radius: var(--radius);
        line-height: 1.45;
      }

      .signed-in {
        display: grid;
        gap: 16px;
      }

      .provider {
        display: grid;
        gap: 12px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
      }

      .provider b {
        text-transform: capitalize;
      }

      .small {
        color: var(--muted);
        font-family: "Berkeley Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      @media (max-width: 560px) {
        .topbar {
          padding: 14px 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Lamarck app home">
          <span class="mark">L0</span>
          <span>Lamarck</span>
        </a>
        <nav class="nav" aria-label="App navigation">
          <a href="https://lamarck.ai">Landing</a>
          <a href="/auth/sign-in">Sign in</a>
        </nav>
      </header>

      <main class="main">
        <section class="auth" aria-labelledby="auth-title">
          <h1 class="auth-title" id="auth-title">Sign in</h1>
          <p class="auth-note" id="auth-note">Use your Lamarck account to continue.</p>
          <div id="clerk-mount"></div>
        </section>
      </main>
    </div>

    <script src="/config.js"></script>
    <script type="module">
      const appConfig = window.__LAMARCK_CONFIG__ || {};
      const apiBaseUrl = appConfig.apiBaseUrl || "https://api.lamarck.ai";
      const providers = {
        oura: {
          name: "Oura",
          capability: "Health signals",
          endpoint: `${apiBaseUrl}/providers/oura`,
        },
      };

      const route = new URL(window.location.href);
      const path = route.pathname.replace(/\/+$/, "") || "/";
      const providerMatch = path.match(/^\/providers\/([^/]+)\/connect$/);
      const providerId = providerMatch ? decodeURIComponent(providerMatch[1]) : null;
      const provider = providerId
        ? providers[providerId] || {
            name: providerId.replace(/[-_]/g, " "),
            capability: "Managed provider",
            endpoint: `${apiBaseUrl}/providers/${providerId}`,
          }
        : null;
      const continueTo = providerId
        ? `/providers/${encodeURIComponent(providerId)}/connect${route.search}`
        : "/";

      const mount = document.getElementById("clerk-mount");
      const authTitle = document.getElementById("auth-title");
      const authNote = document.getElementById("auth-note");

      if (provider) {
        authTitle.textContent = `Connect ${provider.name}`;
        authNote.textContent = `Sign in to continue to ${provider.name}.`;
      } else if (path === "/") {
        authTitle.textContent = "Your Lamarck account";
        authNote.textContent = "Manage identity, devices, and provider connections.";
      }

      function showMissingConfig() {
        mount.innerHTML = `
          <div class="fallback">
            <strong>Clerk is not configured for this Worker yet.</strong>
            <span>Set <code>clerkPublishableKey</code> in <code>config.js</code>, then redeploy.</span>
          </div>
        `;
      }

      function renderSignedIn(clerk) {
        const user = clerk.user;
        mount.innerHTML = `
          <div class="signed-in">
            <div>
              <strong>${user?.primaryEmailAddress?.emailAddress || "Signed in"}</strong>
              <div class="small">Lamarck session active</div>
            </div>
            ${
              provider
                ? `<div class="provider">
                    <b>${provider.name}</b>
                    <span>${provider.capability}</span>
                    <span class="small">${provider.endpoint}</span>
                    <button disabled>Provider OAuth not wired yet</button>
                  </div>`
                : `<a class="button" href="/providers/oura/connect">Connect Oura</a>`
            }
            <button id="sign-out" type="button">Sign out</button>
          </div>
        `;
        document.getElementById("sign-out")?.addEventListener("click", () => {
          clerk.signOut({ redirectUrl: "/auth/sign-in" });
        });
      }

      // Clerk's prebuilt UI components (mountSignIn) live only in the browser
      // build served from the instance's Frontend API (FAPI). The generic ESM
      // build on public CDNs omits them, which throws "Clerk was not loaded
      // with UI components". The FAPI host is base64-encoded in the key.
      function loadClerk(publishableKey) {
        if (window.Clerk) return Promise.resolve(window.Clerk);
        const fapi = atob(publishableKey.split("_")[2]).replace(/\$+$/, "");
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.async = true;
          script.crossOrigin = "anonymous";
          script.setAttribute("data-clerk-publishable-key", publishableKey);
          script.src = `https://${fapi}/npm/@clerk/clerk-js@5/dist/clerk.browser.js`;
          script.addEventListener("load", () => resolve(window.Clerk));
          script.addEventListener("error", () =>
            reject(new Error(`Failed to load Clerk from ${fapi}`)),
          );
          document.head.appendChild(script);
        });
      }

      async function mountClerk() {
        const publishableKey = window.__LAMARCK_CONFIG__?.clerkPublishableKey;
        if (!publishableKey) {
          showMissingConfig();
          return;
        }

        mount.innerHTML = `<div class="small">Loading identity...</div>`;
        try {
          const clerk = await loadClerk(publishableKey);
          await clerk.load({
            signInUrl: "/auth/sign-in",
            signUpUrl: "/auth/sign-in",
            signInFallbackRedirectUrl: continueTo,
            signUpFallbackRedirectUrl: continueTo,
            telemetry: { disabled: true },
          });

          if (clerk.user) {
            renderSignedIn(clerk);
            return;
          }

          mount.innerHTML = "";
          clerk.mountSignIn(mount, {
            routing: "path",
            path: "/auth/sign-in",
            signUpUrl: "/auth/sign-in",
            fallbackRedirectUrl: continueTo,
          });
        } catch (error) {
          mount.innerHTML = `
            <div class="fallback">
              <strong>Unable to load Clerk.</strong>
              <span>${String(error?.message || error)}</span>
            </div>
          `;
        }
      }

      mountClerk();
    </script>
  </body>
</html>
